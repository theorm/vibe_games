<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forest Survival</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #hud { position: fixed; top: 16px; left: 16px; color: #fff; text-shadow: 2px 2px 0 #000; font-size: 13px; line-height: 1.8; }
  #health-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  #health-bar { width: 160px; height: 14px; background: #333; border: 2px solid #666; }
  #health-fill { height: 100%; background: #e74c3c; transition: width 0.3s; }
  #deer-bar-wrap { display: flex; align-items: center; gap: 8px; }
  #deer-bar { width: 160px; height: 14px; background: #333; border: 2px solid #666; }
  #deer-fill { height: 100%; background: #8b4513; transition: width 0.3s; }
  #inventory { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
  .inv-slot { width: 52px; height: 52px; background: rgba(0,0,0,0.7); border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 10px; text-align: center; text-shadow: 1px 1px 0 #000; }
  .inv-slot .icon { font-size: 20px; line-height: 1; }
  #message { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 17px; text-align: center; text-shadow: 2px 2px 0 #000; background: rgba(0,0,0,0.8); padding: 20px 28px; border: 2px solid #888; max-width: 480px; line-height: 1.7; display: none; z-index: 30; }
  #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 20px; height: 20px; pointer-events: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
  #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
  #crosshair::after { height: 2px; width: 100%; top: 50%; left: 0; transform: translateY(-50%); }
  #objective { position: fixed; top: 16px; right: 16px; color: #ffe; font-size: 12px; text-shadow: 1px 1px 0 #000; text-align: right; max-width: 220px; line-height: 1.7; }
  #objective div { opacity: 0.5; }
  #objective div.active { opacity: 1; color: #ffd700; }
  #objective div.done { opacity: 0.35; text-decoration: line-through; color: #aaa; }
  #action-hint { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 13px; text-shadow: 1px 1px 0 #000; background: rgba(0,0,0,0.55); padding: 4px 14px; border: 1px solid #666; white-space: nowrap; }
  #minimap { position: fixed; bottom: 16px; right: 16px; width: 110px; height: 110px; border: 2px solid #555; background: rgba(0,0,0,0.6); overflow: hidden; }
  #minimap canvas { width: 100%; height: 100%; }
  #screen-flash { position: fixed; top:0;left:0;width:100%;height:100%; pointer-events:none; opacity:0; z-index:20; transition: opacity 0.1s; }
  #event-banner { position: fixed; top: 76px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 20px; font-weight: bold; text-shadow: 0 0 12px currentColor, 2px 2px 0 #000; background: rgba(0,0,0,0.75); padding: 8px 24px; border: 2px solid #f00; display: none; letter-spacing: 2px; animation: pulse 0.7s infinite alternate; z-index: 25; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }
  #car-hint { position: fixed; bottom: 118px; left: 50%; transform: translateX(-50%); color: #0ff; font-size: 13px; text-shadow: 1px 1px 0 #000; background: rgba(0,0,60,0.75); padding: 4px 14px; border: 1px solid #0af; display: none; }
  #clock { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: #ffe; font-size: 13px; text-shadow: 1px 1px 0 #000; background: rgba(0,0,0,0.45); padding: 2px 14px; border: 1px solid #555; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="hud">
    <div id="health-bar-wrap">❤️ <div id="health-bar"><div id="health-fill" style="width:100%"></div></div> <span id="health-text">100</span></div>
    <div id="deer-bar-wrap">🦌 <div id="deer-bar"><div id="deer-fill" style="width:100%"></div></div> <span id="deer-text">100</span></div>
    <div id="resource-info" style="margin-top:8px;font-size:12px;"></div>
  </div>
  <div id="clock">☀️ Day</div>
  <div id="inventory"></div>
  <div id="crosshair"></div>
  <div id="message"></div>
  <div id="event-banner"></div>
  <div id="car-hint"></div>
  <div id="objective">
    <div id="obj0" class="active">🪓 Chop trees (5 wood)</div>
    <div id="obj1">🔨 Build workbench (safe zone)</div>
    <div id="obj2">⛏️ Craft pickaxe → mine ore</div>
    <div id="obj3">🗡️ Forge sword (3 ore+2 wood)</div>
    <div id="obj4">☠️ Kill the deer</div>
  </div>
  <div id="action-hint"></div>
  <div id="minimap"><canvas id="mm" width="110" height="110"></canvas></div>
  <div id="screen-flash"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// FOREST SURVIVAL  —  Three.js r128
// ============================================================
const W = window.innerWidth, H = window.innerHeight;
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x87ceeb);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 30, 90);
const camera = new THREE.PerspectiveCamera(70, W/H, 0.1, 200);

// ── CONSTANTS ──────────────────────────────────────────────
const FOREST_R    = 50;
const SAFE_R      = 8;
const TREE_COUNT  = 60;
const MINE_COUNT  = 3;
const PLAYER_SPD  = 6;
const DEER_SPD    = 3.5;
const DEER_CHASE_R= 18;
const DEER_ATK_R  = 2.0;
const DEER_ATK_DMG= 12;
const DEER_ATK_INT= 1.8;
const PLAYER_ATK_R= 2.5;
const CHOP_RANGE  = 2.8;
const DAY_LEN     = 120;  // seconds per full day
const CAR_SPD     = 14;
const CAR_TURN    = 2.2;

// ── STATE ──────────────────────────────────────────────────
const keys = {};
let playerHP = 100, deerHP = 100;
let playerAttackTimer = 0;
let gameOver = false, gameWon = false;

const resources = { wood: 0, ore: 0 };
const built = { workbench: false };
let hasSword = false, hasPickaxe = false;
let stage = 0;

const trees = [], mines = [];
const deforestedCells = new Set();

let dayTime   = 0.30;   // 0=midnight 0.25=dawn 0.5=noon 0.75=dusk
let wasDawn   = false;
let alienTimer= 50 + Math.random()*60;

const aliens  = [];
const zombies = [];

let inCar    = false;
const carPos = new THREE.Vector3(0, 0, -5);
let carFacing= 0;

// ── LIGHTING ───────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xfff5e0, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff8e0, 1.0);
sun.position.set(30, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.width  = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1; sun.shadow.camera.far  = 160;
sun.shadow.camera.left = -80; sun.shadow.camera.right = 80;
sun.shadow.camera.top  =  80; sun.shadow.camera.bottom = -80;
scene.add(sun);
const moonLight = new THREE.DirectionalLight(0x334466, 0.3);
moonLight.position.set(-30, 40, -20);
scene.add(moonLight);

// ── GROUND & WORLD DRESSING ────────────────────────────────
(function makeGround() {
  // Base grass
  const m = new THREE.Mesh(new THREE.PlaneGeometry(300,300), new THREE.MeshLambertMaterial({color:0x4a7a3a}));
  m.rotation.x = -Math.PI/2; m.receiveShadow = true; scene.add(m);
  // Forest floor
  const fm = new THREE.Mesh(new THREE.CircleGeometry(FOREST_R,48), new THREE.MeshLambertMaterial({color:0x2d5a1b}));
  fm.rotation.x=-Math.PI/2; fm.position.y=0.01; fm.receiveShadow=true; scene.add(fm);
  // Safe circle
  const sm = new THREE.Mesh(new THREE.CircleGeometry(SAFE_R,32), new THREE.MeshLambertMaterial({color:0x6aaa5a}));
  sm.rotation.x=-Math.PI/2; sm.position.y=0.02; scene.add(sm);
  // Border ring
  const rm = new THREE.Mesh(new THREE.RingGeometry(FOREST_R,FOREST_R+0.5,64), new THREE.MeshBasicMaterial({color:0x8b6914,side:THREE.DoubleSide}));
  rm.rotation.x=-Math.PI/2; rm.position.y=0.03; scene.add(rm);
  // Road to lab
  const road = new THREE.Mesh(new THREE.PlaneGeometry(100,5), new THREE.MeshLambertMaterial({color:0x555555}));
  road.rotation.x=-Math.PI/2; road.position.set(100,0.01,0); scene.add(road);
  // Lab building
  const lab = new THREE.Mesh(new THREE.BoxGeometry(14,7,11), new THREE.MeshLambertMaterial({color:0x7a7a8a}));
  lab.position.set(152,3.5,0); lab.castShadow=true; scene.add(lab);
  const labRoof = new THREE.Mesh(new THREE.BoxGeometry(14,1.5,11), new THREE.MeshLambertMaterial({color:0x555566}));
  labRoof.position.set(152,7.75,0); scene.add(labRoof);
  // Lab glow window
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(3,3), new THREE.MeshBasicMaterial({color:0x00ff44,side:THREE.DoubleSide}));
  glow.position.set(144.9,3.5,0); glow.rotation.y=Math.PI/2; scene.add(glow);
  // Lab sign
  const sign = new THREE.Mesh(new THREE.BoxGeometry(0.1,2,4), new THREE.MeshBasicMaterial({color:0x00ee00}));
  sign.position.set(144.5,2.5,0); scene.add(sign);
})();

// ── TREES ──────────────────────────────────────────────────
function makeTree(x, z) {
  const g = new THREE.Group(); g.position.set(x,0,z);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.3,2.2,6), new THREE.MeshLambertMaterial({color:0x5a3a1a}));
  trunk.position.y=1.1; trunk.castShadow=true; g.add(trunk);
  const cols=[0x2d7a1b,0x3a9a25,0x1f5a12];
  for(let i=0;i<3;i++){
    const l=new THREE.Mesh(new THREE.BoxGeometry(1.8-i*0.3,1.0,1.8-i*0.3),new THREE.MeshLambertMaterial({color:cols[i]}));
    l.position.y=2.4+i*0.7; l.castShadow=true; g.add(l);
  }
  scene.add(g);
  trees.push({mesh:g,x,z,hp:3,alive:true});
}

// ── MINES ──────────────────────────────────────────────────
function makeMine(x, z) {
  const g = new THREE.Group(); g.position.set(x,0,z);
  const cols=[0x888899,0x777788,0x998888];
  for(let i=0;i<3;i++){
    const r=new THREE.Mesh(new THREE.BoxGeometry(0.9+Math.random()*0.6,0.8+Math.random()*0.4,0.9+Math.random()*0.6),new THREE.MeshLambertMaterial({color:cols[i]}));
    r.position.set((Math.random()-0.5)*0.8,0.4+Math.random()*0.3,(Math.random()-0.5)*0.8);
    r.rotation.y=Math.random()*Math.PI; r.castShadow=true; g.add(r);
  }
  const ore=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3),new THREE.MeshLambertMaterial({color:0xb87333}));
  ore.position.set(0,0.85,0); g.add(ore);
  scene.add(g);
  mines.push({mesh:g,x,z,hp:3,alive:true});
}

// ── PLAYER ─────────────────────────────────────────────────
const playerGroup = new THREE.Group();
scene.add(playerGroup);

function buildPlayer() {
  playerGroup.clear();
  const skin=new THREE.MeshLambertMaterial({color:0xf5d0a9});
  const shirt=new THREE.MeshLambertMaterial({color:0x3a8cca});
  const pants=new THREE.MeshLambertMaterial({color:0x2a4a8a});
  const hat1=new THREE.MeshLambertMaterial({color:0x6b3d1a});
  const hat2=new THREE.MeshLambertMaterial({color:0x5a3014});

  const body=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.7,0.3),shirt);
  body.position.y=0.85; body.castShadow=true; playerGroup.add(body);
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4),skin);
  head.position.y=1.45; head.castShadow=true; playerGroup.add(head);
  const brim=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.06,0.7),hat1);
  brim.position.y=1.65; playerGroup.add(brim);
  const hatTop=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.22,0.38),hat2);
  hatTop.position.y=1.78; hatTop.rotation.z=0.18; playerGroup.add(hatTop);
  for(const s of[-1,1]){
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.5,0.2),pants);
    leg.position.set(s*0.15,0.25,0); leg.castShadow=true; playerGroup.add(leg);
  }
  for(const s of[-1,1]){
    const arm=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.5,0.18),shirt);
    arm.position.set(s*0.35,0.85,0); arm.castShadow=true; playerGroup.add(arm);
  }
  // Axe
  const axeH=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.7,0.07),new THREE.MeshLambertMaterial({color:0x6b4423}));
  axeH.position.set(0.55,0.75,0.15); playerGroup.add(axeH);
  const axeB=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.22,0.08),new THREE.MeshLambertMaterial({color:0xaaaaaa}));
  axeB.position.set(0.62,1.1,0.15); playerGroup.add(axeB);
}
buildPlayer();

const player = {
  pos: new THREE.Vector3(FOREST_R+2,0,0),
  facing: Math.PI,
  hp: 100,
  invincTimer: 0
};
playerGroup.position.copy(player.pos);

// ── DEER ───────────────────────────────────────────────────
const deerGroup = new THREE.Group();
scene.add(deerGroup);

function buildDeer() {
  deerGroup.clear();
  const brown=new THREE.MeshLambertMaterial({color:0x8b5a2b});
  const dkBrn=new THREE.MeshLambertMaterial({color:0x5a3010});
  const tan=new THREE.MeshLambertMaterial({color:0xd2a06a});

  const body=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.6,0.5),brown);
  body.position.y=0.8; body.castShadow=true; deerGroup.add(body);
  const neck=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.5,0.3),brown);
  neck.position.set(0.45,1.1,0); neck.rotation.z=-0.4; deerGroup.add(neck);
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.32,0.32),brown);
  head.position.set(0.78,1.35,0); head.castShadow=true; deerGroup.add(head);
  const snout=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.14,0.24),tan);
  snout.position.set(0.96,1.26,0); deerGroup.add(snout);
  for(const s of[-1,1]){
    const eye=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.07,0.04),new THREE.MeshBasicMaterial({color:0xff2200}));
    eye.position.set(0.85,1.42,s*0.14); deerGroup.add(eye);
  }
  for(const s of[-1,1]){
    const base=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,0.4,4),dkBrn);
    base.position.set(0.72,1.62,s*0.12); base.rotation.z=s*0.25; deerGroup.add(base);
    for(let b=0;b<2;b++){
      const br=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,0.28,4),dkBrn);
      br.position.set(0.72+s*0.08+b*0.1*s,1.88+b*0.1,s*0.2); br.rotation.z=s*(0.7+b*0.3); deerGroup.add(br);
    }
  }
  for(const[lx,lz] of[[0.3,0.25],[0.3,-0.25],[-0.3,0.25],[-0.3,-0.25]]){
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.55,0.16),brown);
    leg.position.set(lx,0.3,lz); leg.castShadow=true; deerGroup.add(leg);
  }
  const tail=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.14,0.1),tan);
  tail.position.set(-0.54,0.95,0); deerGroup.add(tail);
}
buildDeer();

const deer={
  pos:new THREE.Vector3(0,0,FOREST_R*0.6),
  facing:0,hp:100,state:'wander',
  wanderTarget:new THREE.Vector3(),wanderTimer:0,
  legPhase:0,attackTimer:0,alive:true
};
deerGroup.position.copy(deer.pos);

// ── CAR ────────────────────────────────────────────────────
const carGroup = new THREE.Group();
scene.add(carGroup);

(function buildCar(){
  const red=new THREE.MeshLambertMaterial({color:0xcc2200});
  const dkGry=new THREE.MeshLambertMaterial({color:0x333333});
  const glass=new THREE.MeshLambertMaterial({color:0x88ccff,transparent:true,opacity:0.7});
  const yellow=new THREE.MeshBasicMaterial({color:0xffff00});
  const wMat=new THREE.MeshLambertMaterial({color:0x1a1a1a});

  const body=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.7,1.1),red);
  body.position.y=0.65; body.castShadow=true; carGroup.add(body);
  const cab=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.65,1.0),red);
  cab.position.set(-0.1,1.2,0); cab.castShadow=true; carGroup.add(cab);
  const wind=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.55,0.9),glass);
  wind.position.set(0.55,1.18,0); carGroup.add(wind);
  const rear=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.55,0.9),glass);
  rear.position.set(-0.75,1.18,0); carGroup.add(rear);
  // 4 wheels
  for(const[wx,wz] of[[0.8,0.6],[0.8,-0.6],[-0.7,0.6],[-0.7,-0.6]]){
    const whl=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.22,12),wMat);
    whl.rotation.z=Math.PI/2; whl.position.set(wx,0.3,wz); carGroup.add(whl);
  }
  for(const z of[0.4,-0.4]){
    const hl=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.12,0.2),yellow);
    hl.position.set(1.12,0.7,z); carGroup.add(hl);
  }
  const bump=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.2,1.1),dkGry);
  bump.position.set(1.15,0.42,0); carGroup.add(bump);
})();
carGroup.position.copy(carPos);

// ── WORKBENCH ──────────────────────────────────────────────
let workbenchMesh=null, workbenchPos=null;

function placeWorkbench(x,z){
  workbenchMesh=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.7,0.8),new THREE.MeshLambertMaterial({color:0x8b6523}));
  workbenchMesh.position.set(x,0.35,z); workbenchMesh.castShadow=true; scene.add(workbenchMesh);
  const top=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.06,0.8),new THREE.MeshLambertMaterial({color:0xa07830}));
  top.position.set(x,0.73,z); scene.add(top);
  built.workbench=true;
  workbenchPos=new THREE.Vector3(x,0,z);
}

function addSwordToPlayer(){
  const toRemove=[];
  playerGroup.children.forEach((c,i)=>{ if(i>=8) toRemove.push(c); });
  toRemove.forEach(c=>playerGroup.remove(c));
  const blade=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.7,0.04),new THREE.MeshLambertMaterial({color:0xddddff}));
  blade.position.set(0.55,1.05,0.1); playerGroup.add(blade);
  const guard=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.06,0.06),new THREE.MeshLambertMaterial({color:0xd4a017}));
  guard.position.set(0.55,0.72,0.1); playerGroup.add(guard);
  const grip=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.28,0.07),new THREE.MeshLambertMaterial({color:0x5a3010}));
  grip.position.set(0.55,0.56,0.1); playerGroup.add(grip);
}

// ── WORLD GEN ──────────────────────────────────────────────
(function generateWorld(){
  let p=0;
  while(p<TREE_COUNT){
    const a=Math.random()*Math.PI*2, r=SAFE_R+2+Math.random()*(FOREST_R-SAFE_R-4);
    const x=Math.cos(a)*r, z=Math.sin(a)*r;
    if(Math.sqrt(x*x+z*z)>48) continue;
    if(Math.abs(x-(FOREST_R+2))<3) continue;
    makeTree(x,z); p++;
  }
  let mp=0;
  while(mp<MINE_COUNT){
    const a=Math.random()*Math.PI*2, r=FOREST_R*0.45+Math.random()*FOREST_R*0.45;
    const x=Math.cos(a)*r, z=Math.sin(a)*r;
    if(Math.sqrt(x*x+z*z)<SAFE_R+4) continue;
    makeMine(x,z); mp++;
  }
})();

// ── SPAWN ENEMIES ──────────────────────────────────────────
function spawnAliens(){
  showEventBanner('👽 ALIENS LANDING!',5000,'#0f0');
  for(let i=0;i<4;i++){
    const g=new THREE.Group();
    const gMat=new THREE.MeshLambertMaterial({color:0x44dd44});
    const body=new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),gMat);
    body.position.y=0.7; g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.28,8,8),new THREE.MeshLambertMaterial({color:0x55ee55}));
    head.position.y=1.2; g.add(head);
    for(const ex of[-0.13,0.13]){
      const eye=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6),new THREE.MeshBasicMaterial({color:0xff0000}));
      eye.position.set(ex,1.28,0.22); g.add(eye);
    }
    for(const s of[-1,1]){
      const arm=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.4,0.1),gMat);
      arm.position.set(s*0.45,0.75,0); g.add(arm);
    }
    const ufo=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.14,16),new THREE.MeshLambertMaterial({color:0xccccff}));
    ufo.position.y=2.0; g.add(ufo);
    const dome=new THREE.Mesh(new THREE.SphereGeometry(0.28,8,8),new THREE.MeshBasicMaterial({color:0x88aaff,transparent:true,opacity:0.7}));
    dome.position.y=2.2; g.add(dome);
    // Beam effect
    const beam=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.3,1.8,8),new THREE.MeshBasicMaterial({color:0x88ff88,transparent:true,opacity:0.3}));
    beam.position.y=1.1; g.add(beam);

    const angle=Math.random()*Math.PI*2;
    const r=FOREST_R+10+Math.random()*25;
    const pos=new THREE.Vector3(Math.cos(angle)*r,0,Math.sin(angle)*r);
    g.position.copy(pos); scene.add(g);
    aliens.push({mesh:g,pos:pos.clone(),hp:2,alive:true,speed:3+Math.random()*2,attackTimer:1+Math.random()});
  }
}

function spawnZombies(){
  showEventBanner('🧟 ZOMBIES FROM THE LAB!',6000,'#f80');
  for(let i=0;i<6;i++){
    const g=new THREE.Group();
    const zMat=new THREE.MeshLambertMaterial({color:0x5a8a3a});

    head.position.y=1.42; g.add(head);
    for(const s of[-1,1]){
      const eye=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.07,0.04),zEye);
      eye.position.set(s*0.11,1.45,0.2); g.add(eye);

    for(const s of[-1,1]){
      const arm=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.45,0.16),zMat);
      arm.position.set(s*0.33,1.0,0.22); arm.rotation.x=-0.7; g.add(arm);
    }
    for(const s of[-1,1]){
      const leg=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.48,0.18),zMat);
      leg.position.set(s*0.13,0.24,0); g.add(leg);
    }
    // Spawn from lab direction
    const pos=new THREE.Vector3(125+Math.random()*20,(Math.random()-0.5)*18,0);

    zombies.push({mesh:g,pos:pos.clone(),hp:2,alive:true,speed:2+Math.random()*1.5,attackTimer:1.5+Math.random(),legPhase:Math.random()*Math.PI*2});
  }
}

// ── HELPERS ────────────────────────────────────────────────
function dist2D(ax,az,bx,bz){const dx=ax-bx,dz=az-bz;return Math.sqrt(dx*dx+dz*dz);}
function isInSafeZone(x,z){return dist2D(x,z,0,0)<SAFE_R;}
function isInForest(x,z){return dist2D(x,z,0,0)<FOREST_R;}
function cellKey(x,z){return`${Math.round(x)},${Math.round(z)}`;}
function checkTreeCollision(x,z,r){for(const t of trees){if(!t.alive)continue;if(dist2D(x,z,t.x,t.z)<r+0.5)return true;}return false;}
function deerCanEnter(x,z){return isInForest(x,z)&&!isInSafeZone(x,z);}

function addStump(x,z){
  const s=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.3,0.3,6),new THREE.MeshLambertMaterial({color:0x4a2a0a}));
  s.position.set(x,0.15,z); scene.add(s);
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++) deforestedCells.add(cellKey(x+dx,z+dz));
}

function updateClock(){
  const t=dayTime;
  const names=['🌙 Night','🌅 Dawn','🌄 Morning','☀️ Noon','🌇 Dusk','🌆 Evening','🌙 Night'];
  const idx=Math.min(Math.floor(((t+1/14)%1)*7),6);
  document.getElementById('clock').textContent=names[idx];

  // Sky gradient
  let sr,sg,sb;
  if(t<0.25){const f=t/0.25;sr=Math.floor(10+f*120);sg=Math.floor(10+f*100);sb=Math.floor(30+f*140);}
  else if(t<0.5){const f=(t-0.25)/0.25;sr=Math.floor(130+f*5);sg=Math.floor(110+f*96);sb=Math.floor(170+f*65);}
  else if(t<0.75){const f=(t-0.5)/0.25;sr=Math.floor(135-f*50);sg=Math.floor(206-f*130);sb=Math.floor(235-f*100);}
  else{const f=(t-0.75)/0.25;sr=Math.floor(85-f*75);sg=Math.floor(76-f*66);sb=Math.floor(135-f*105);}
  const skyHex=(sr<<16)|(sg<<8)|sb;
  renderer.setClearColor(skyHex);
  scene.fog.color.setHex(skyHex);

  const sunInt=Math.max(0,Math.sin(t*Math.PI*2-Math.PI/2)*0.8+0.5);
  sun.intensity=sunInt;
  ambient.intensity=0.3+sunInt*0.4;
  moonLight.intensity=Math.max(0,0.4-sunInt*0.3);
}

function updateCarHint(){

  if(!inCar&&nearCar){ch.style.display='block';ch.textContent='[SPACE] Get in car 🚗';}
  else if(inCar){ch.style.display='block';ch.textContent='[SPACE] Exit car  |  ↑↓ Drive  ←→ Steer';}
  else{ch.style.display='none';}
}

// ── INPUT ──────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();handleAction();}
  if(e.key==='Escape') hideMessage();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function handleAction(){
  if(gameOver||gameWon) return;

  // Car enter/exit
  const nearCar=dist2D(player.pos.x,player.pos.z,carPos.x,carPos.z)<3;
  if(!inCar&&nearCar){
    inCar=true; playerGroup.visible=false;
    setActionHint('🚗 Driving! ↑↓ accelerate, ←→ steer, SPACE exit.'); return;
  }
  if(inCar){
    inCar=false;
    player.pos.set(carPos.x+2,0,carPos.z);
    playerGroup.visible=true;
    setActionHint('Exited car.'); return;
  }

  const px=player.pos.x, pz=player.pos.z;
  const fwdX=-Math.sin(player.facing), fwdZ=-Math.cos(player.facing);

  // Attack deer
  if(hasSword&&playerAttackTimer<=0&&dist2D(px,pz,deer.pos.x,deer.pos.z)<PLAYER_ATK_R){
    playerAttackTimer=0.6;
    sfxSwing();
    deerHP=Math.max(0,deerHP-25);
    setActionHint('⚔️ Hit! Deer HP: '+Math.ceil(deerHP));
    if(deerHP<=0) triggerWin();
    return;
  }

  // Chop tree
  for(const t of trees){
    if(!t.alive) continue;
    if(dist2D(px,pz,t.x,t.z)<CHOP_RANGE){
      t.hp--;
      sfxChop();
      setActionHint(`🪓 Chopping... (${t.hp} hits left)`);
      if(t.hp<=0){
        t.alive=false; scene.remove(t.mesh);
        addStump(t.x,t.z); resources.wood+=3;
        setActionHint('🪵 Got 3 wood!');
        checkProgress();
      }
      return;
    }
  }

  // Mine (need pickaxe)
  if(hasPickaxe){
    for(const m of mines){
      if(!m.alive) continue;
      if(dist2D(px,pz,m.x,m.z)<CHOP_RANGE){
        m.hp--;
        sfxChop();
        setActionHint(`⛏️ Mining... (${m.hp} hits left)`);
        if(m.hp<=0){
          m.alive=false; scene.remove(m.mesh);
          resources.ore+=3;
          setActionHint('⛰️ Got 3 ore!');
          checkProgress();
        }
        return;
      }
    }
  }

  // Workbench interactions
  if(workbenchPos&&dist2D(px,pz,workbenchPos.x,workbenchPos.z)<2.5){
    if(!hasPickaxe){
      if(resources.wood>=3){
        resources.wood-=3; hasPickaxe=true; stage=Math.max(stage,2);
        sfxCraft();
        setActionHint('⛏️ Pickaxe crafted!');
        showMessage('⛏️ <strong>Pickaxe crafted!</strong><br>Find grey rock formations (mines) deep in the forest.<br>Walk up close and press SPACE to mine ore!',5000);
        updateHUD();
      } else {
        setActionHint(`Need 3 wood for pickaxe — have ${resources.wood}`);
      }
      return;
    }
    if(!hasSword){
      if(resources.ore>=3&&resources.wood>=2){
        resources.ore-=3; resources.wood-=2;
        hasSword=true; addSwordToPlayer(); stage=4;
        sfxCraft();
        setActionHint('🗡️ Sword forged! Hunt the deer!');
        showMessage('🗡️ <strong>SWORD FORGED!</strong><br>Hunt down the deer and press SPACE when close to attack it!',5000);
        updateHUD();
      } else {
        setActionHint(`Sword needs 3 ore + 2 wood — have ore:${resources.ore} wood:${resources.wood}`);
      }
      return;
    }
    setActionHint('Nothing left to craft.'); return;
  }

  // Build workbench in safe zone
  if(!built.workbench&&isInSafeZone(px,pz)){
    if(resources.wood>=5){
      resources.wood-=5;
      placeWorkbench(px+fwdX*1.5, pz+fwdZ*1.5);
      stage=Math.max(stage,1);
      setActionHint('🔨 Workbench placed! Walk up and press SPACE.');
      showMessage('🔨 <strong>Workbench built!</strong><br>Walk up to it and press SPACE.<br>First craft: Pickaxe (3 wood) → mine ore → Sword (3 ore + 2 wood)',5500);
      updateHUD();
    } else {
      setActionHint(`Need 5 wood — have ${resources.wood}`);
    }
    return;
  }

  setActionHint('Nothing to do here.');
}

function checkProgress(){
  if(resources.wood>=5&&stage===0){
    stage=1;
    showMessage('🪵 <strong>Enough wood!</strong><br>Go to the safe zone (green circle in center).<br>Press SPACE to build a Workbench!',5000);
  }
  if(resources.ore>=3&&hasPickaxe&&!hasSword&&stage<3){
    stage=3;
    showMessage('⛰️ <strong>Enough ore!</strong><br>Return to the Workbench and press SPACE to forge the Sword!',5000);
  }
  updateHUD();
}

function updateContextHints(){
  if(gameOver||gameWon) return;
  if(inCar){setActionHint('🚗 Driving — SPACE to exit');return;}
  const px=player.pos.x, pz=player.pos.z;

  if(dist2D(px,pz,carPos.x,carPos.z)<3){setActionHint('[SPACE] Get in car 🚗');return;}
  if(hasSword&&dist2D(px,pz,deer.pos.x,deer.pos.z)<PLAYER_ATK_R+1.5){setActionHint('[SPACE] ⚔️ ATTACK THE DEER!');return;}

  if(workbenchPos&&dist2D(px,pz,workbenchPos.x,workbenchPos.z)<2.5){
    if(!hasPickaxe) setActionHint(`[SPACE] Craft Pickaxe — need 3 wood (have ${resources.wood})`);
    else if(!hasSword) setActionHint(`[SPACE] Forge Sword — need 3 ore+2 wood (have ${resources.ore} ore, ${resources.wood} wood)`);
    else setActionHint('Workbench: fully used!');
    return;
  }

  if(!built.workbench&&isInSafeZone(px,pz)&&resources.wood>=5){setActionHint('[SPACE] Build Workbench (5 wood)');return;}

  for(const m of mines){
    if(!m.alive) continue;
    if(dist2D(px,pz,m.x,m.z)<3){
      setActionHint(hasPickaxe?'[SPACE] Mine ore':'⛏️ Need Pickaxe — craft at Workbench first');
      return;
    }
  }
  for(const t of trees){
    if(!t.alive) continue;
    if(dist2D(px,pz,t.x,t.z)<3){setActionHint('[SPACE] Chop tree');return;}
  }
  setActionHint('');
}

// ── DEER AI ────────────────────────────────────────────────
function updateDeer(dt){
  if(!deer.alive||gameOver||gameWon) return;
  const ap=inCar?carPos:player.pos;
  const dx=deer.pos.x-ap.x, dz=deer.pos.z-ap.z;
  const d=Math.sqrt(dx*dx+dz*dz);

  if(isInSafeZone(ap.x,ap.z)&&!inCar) deer.state='wander';
  else if(d<DEER_CHASE_R) deer.state='chase';
  else deer.state='wander';

  let mx=0, mz=0;
  if(deer.state==='chase'){
    const len=d||1; mx=-(dx/len)*DEER_SPD; mz=-(dz/len)*DEER_SPD;
    deer.facing=Math.atan2(-mx,-mz);
    deer.attackTimer-=dt;
    if(d<DEER_ATK_R&&deer.attackTimer<=0&&!inCar){
      deer.attackTimer=DEER_ATK_INT;
      if(player.invincTimer<=0){
        playerHP-=DEER_ATK_DMG; player.invincTimer=0.5;
        sfxDeerRoar();
        flashColor('rgba(255,0,0,0.4)');
        if(playerHP<=0){playerHP=0;triggerDeath('deer');}
      }
    }
  } else {
    deer.wanderTimer-=dt;
    if(deer.wanderTimer<=0){
      deer.wanderTimer=2+Math.random()*3;
      const a=Math.random()*Math.PI*2;
      const r=SAFE_R+3+Math.random()*(FOREST_R-SAFE_R-5);
      deer.wanderTarget.set(Math.cos(a)*r,0,Math.sin(a)*r);
    }
    const tx=deer.wanderTarget.x-deer.pos.x, tz=deer.wanderTarget.z-deer.pos.z;
    const tl=Math.sqrt(tx*tx+tz*tz)||1;
    if(tl>1){mx=(tx/tl)*DEER_SPD*0.5;mz=(tz/tl)*DEER_SPD*0.5;deer.facing=Math.atan2(-mx,-mz);}
  }

  const nx=deer.pos.x+mx*dt, nz=deer.pos.z+mz*dt;
  if(deerCanEnter(nx,nz)&&!deforestedCells.has(cellKey(nx,nz))){
    deer.pos.x=nx; deer.pos.z=nz;
  } else { deer.wanderTimer=0; }

  deer.legPhase+=dt*4;
  deerGroup.position.set(deer.pos.x,Math.abs(Math.sin(deer.legPhase*0.5))*0.05,deer.pos.z);
  deerGroup.rotation.y=deer.facing;
  deerGroup.rotation.z=Math.sin(deer.legPhase)*0.15;
  deerGroup.children.forEach((c,i)=>{if(i>=12&&i<=15) c.position.y=0.3+Math.sin(deer.legPhase+i*1.5)*0.08;});
}

// ── ENEMY AI ───────────────────────────────────────────────
function updateEnemies(dt){
  const ap=inCar?carPos:player.pos;
  for(const e of [...aliens,...zombies]){
    if(!e.alive) continue;
    const dx=ap.x-e.pos.x, dz=ap.z-e.pos.z;
    const d=Math.sqrt(dx*dx+dz*dz)||1;
    e.pos.x+=(dx/d)*e.speed*dt;
    e.pos.z+=(dz/d)*e.speed*dt;
    e.mesh.position.set(e.pos.x,0,e.pos.z);
    e.mesh.rotation.y=Math.atan2(dx,dz);

    if('legPhase' in e){
      e.legPhase+=dt*3;
      e.mesh.rotation.z=Math.sin(e.legPhase)*0.12;
      e.mesh.position.y=Math.abs(Math.sin(e.legPhase*0.5))*0.04;
    } else {
      e.mesh.position.y=0.1+Math.sin(Date.now()*0.003+e.pos.x)*0.15;
    }

    e.attackTimer-=dt;
    if(d<1.8&&e.attackTimer<=0&&!inCar){
      e.attackTimer=2.0;
      if(player.invincTimer<=0){
        const dmg=aliens.includes(e)?15:10;
        playerHP-=dmg; player.invincTimer=0.4;
        flashColor(aliens.includes(e)?'rgba(0,255,0,0.35)':'rgba(200,140,0,0.4)');
        if(playerHP<=0){playerHP=0;triggerDeath(aliens.includes(e)?'alien':'zombie');}
      }
    }

    // Car kills enemies
    if(inCar&&dist2D(e.pos.x,e.pos.z,carPos.x,carPos.z)<2.5){
      e.alive=false; scene.remove(e.mesh);
      setActionHint('💥 Squashed!');
    }
    if(dist2D(e.pos.x,e.pos.z,0,0)>210){e.alive=false;scene.remove(e.mesh);}
  }
}

// ── CAR ────────────────────────────────────────────────────
function updateCar(dt){
  if(inCar){
    // LEFT key = turn right (positive facing), RIGHT key = turn left (negative facing)
    if(keys['ArrowLeft'])  carFacing+=CAR_TURN*dt;
    if(keys['ArrowRight']) carFacing-=CAR_TURN*dt;
    let spd=0;
    if(keys['ArrowUp'])   spd=CAR_SPD;
    if(keys['ArrowDown']) spd=-CAR_SPD*0.5;
    carPos.x-=Math.sin(carFacing)*spd*dt;
    carPos.z-=Math.cos(carFacing)*spd*dt;
    player.pos.copy(carPos);
    player.facing=carFacing;
  }
  carGroup.position.set(carPos.x,0,carPos.z);
  carGroup.rotation.y=carFacing+Math.PI;
  if(inCar&&(keys['ArrowUp']||keys['ArrowDown'])){
    const dir=keys['ArrowDown']?-1:1;
    carGroup.children.forEach((c,i)=>{ if(i>=6&&i<=9) c.rotation.x+=dt*9*dir; });
  }
}

// ── PLAYER ─────────────────────────────────────────────────
function updatePlayer(dt){
  if(gameOver||gameWon||inCar) return;

  // LEFT = turn right (+), RIGHT = turn left (-)
  if(keys['ArrowLeft'])  player.facing+=1.8*dt;
  if(keys['ArrowRight']) player.facing-=1.8*dt;

  let mx=0,mz=0;
  if(keys['ArrowUp'])  {mx=-Math.sin(player.facing)*PLAYER_SPD;mz=-Math.cos(player.facing)*PLAYER_SPD;}
  if(keys['ArrowDown']){mx= Math.sin(player.facing)*PLAYER_SPD*0.5;mz= Math.cos(player.facing)*PLAYER_SPD*0.5;}

  const nx=player.pos.x+mx*dt, nz=player.pos.z+mz*dt;
  if(dist2D(nx,nz,0,0)<FOREST_R+10){
    let blocked=checkTreeCollision(nx,nz,0.4);
    if(!blocked&&workbenchPos&&dist2D(nx,nz,workbenchPos.x,workbenchPos.z)<0.9) blocked=true;
    if(!blocked){player.pos.x=nx;player.pos.z=nz;}
  }

  const moving=mx!==0||mz!==0;
  playerGroup.position.y=moving?Math.abs(Math.sin(Date.now()*0.007))*0.08:0;
  playerGroup.position.x=player.pos.x;
  playerGroup.position.z=player.pos.z;
  playerGroup.rotation.y=player.facing+Math.PI;

  if(player.invincTimer>0){player.invincTimer-=dt;playerGroup.visible=Math.sin(Date.now()*0.025)>0;}
  else playerGroup.visible=true;
  if(playerAttackTimer>0) playerAttackTimer-=dt;
  updateContextHints();
}

// ── DAY CYCLE ──────────────────────────────────────────────
function updateDayCycle(dt){
  dayTime=(dayTime+dt/DAY_LEN)%1;
  const isDawn=dayTime>0.22&&dayTime<0.30;
  if(isDawn&&!wasDawn){
    wasDawn=true;
    if(zombies.filter(z=>z.alive).length===0) spawnZombies();
  }
  if(!isDawn) wasDawn=false;

  alienTimer-=dt;
  if(alienTimer<=0){
    alienTimer=60+Math.random()*90;
    if(aliens.filter(a=>a.alive).length<3) spawnAliens();
  }
  updateClock();
}

// ── WIN/LOSE ───────────────────────────────────────────────
function triggerWin(){
  gameWon=true; deer.alive=false; deerGroup.visible=false;
  showMessage(`🎉 <strong>VICTORY!</strong><br><br>You slew the vicious deer!<br>The forest is saved.<br><br><em style="font-size:13px">Reload to play again</em>`);
}
function triggerDeath(by='deer'){
  gameOver=true;
  const msgs={deer:'🦌 The deer ate you.',alien:'👽 Abducted and probed.',zombie:'🧟 You became a zombie.'};
  showMessage(`💀 <strong>YOU DIED</strong><br><br>${msgs[by]||msgs.deer}<br><br><em style="font-size:13px">Reload to try again</em>`);
}

// ── MINIMAP ────────────────────────────────────────────────
function updateMinimap(){
  const mm=document.getElementById('mm');
  const ctx=mm.getContext('2d');
  const S=110, scale=S/(FOREST_R*2+24), cx=S/2, cy=S/2;
  ctx.clearRect(0,0,S,S);
  ctx.fillStyle='#1a3a10'; ctx.fillRect(0,0,S,S);
  ctx.beginPath(); ctx.arc(cx,cy,FOREST_R*scale,0,Math.PI*2); ctx.fillStyle='#2d5a1b'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,SAFE_R*scale,0,Math.PI*2); ctx.fillStyle='#4a8a3a'; ctx.fill();
  // Road
  ctx.fillStyle='#555'; ctx.fillRect(cx+FOREST_R*scale,cy-2,40,4);
  // Lab
  ctx.fillStyle='#556'; ctx.fillRect(cx+FOREST_R*scale+37,cy-5,10,10);
  ctx.fillStyle='#0f0'; ctx.fillRect(cx+FOREST_R*scale+38,cy-4,8,8);

  for(const t of trees){if(!t.alive)continue;ctx.fillStyle='#1a4a10';ctx.fillRect(cx+t.x*scale-1,cy+t.z*scale-1,2,2);}
  for(const m of mines){if(!m.alive)continue;ctx.fillStyle='#888';ctx.fillRect(cx+m.x*scale-2,cy+m.z*scale-2,4,4);}
  for(const a of aliens){if(!a.alive)continue;ctx.fillStyle='#0f0';ctx.beginPath();ctx.arc(cx+a.pos.x*scale,cy+a.pos.z*scale,3,0,Math.PI*2);ctx.fill();}
  for(const z of zombies){if(!z.alive)continue;ctx.fillStyle='#fa0';ctx.beginPath();ctx.arc(cx+z.pos.x*scale,cy+z.pos.z*scale,3,0,Math.PI*2);ctx.fill();}
  if(deer.alive){ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(cx+deer.pos.x*scale,cy+deer.pos.z*scale,3,0,Math.PI*2);ctx.fill();}
  // Car (red square)
  ctx.fillStyle='#f55'; ctx.fillRect(cx+carPos.x*scale-3,cy+carPos.z*scale-2,6,4);
  // Player
  ctx.fillStyle='#3af'; ctx.beginPath(); ctx.arc(cx+player.pos.x*scale,cy+player.pos.z*scale,3,0,Math.PI*2); ctx.fill();
}

// ── CAMERA ─────────────────────────────────────────────────
function updateCamera(){
  const pivot=inCar?carPos:player.pos;
  const facing=inCar?carFacing:player.facing;
  camera.position.set(pivot.x+Math.sin(facing)*7,5,pivot.z+Math.cos(facing)*7);
  camera.lookAt(pivot.x,1.2,pivot.z);
}

// ══════════════════════════════════════════════════════════════
// SOUND ENGINE  —  Web Audio API, fully procedural
// ══════════════════════════════════════════════════════════════
let audioCtx = null;
let musicMasterGain = null;
let sfxMasterGain   = null;
let musicStarted    = false;

// Oscillator nodes kept alive for music
let violinNodes   = [];
let ocarinaNodes  = [];
let droneNodes    = [];
let musicInterval = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  musicMasterGain = audioCtx.createGain(); musicMasterGain.gain.value = 0.18;
  sfxMasterGain   = audioCtx.createGain(); sfxMasterGain.gain.value   = 1.0;
  musicMasterGain.connect(audioCtx.destination);
  sfxMasterGain.connect(audioCtx.destination);

  startSpookyMusic();
  schedulePlayerSounds();
}

// ── HELPERS ────────────────────────────────────────────────
function note(midi) { return 440 * Math.pow(2, (midi-69)/12); }

function makeReverb(ctx, seconds=2.5, decay=2) {
  const conv = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const len  = rate * seconds;
  const buf  = ctx.createBuffer(2, len, rate);
  for (let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  conv.buffer=buf; return conv;
}

function makeTremolo(ctx, rate=5, depth=0.4) {
  const lfo = ctx.createOscillator();
  const gain= ctx.createGain();
  lfo.frequency.value = rate;
  lfo.type='sine';
  gain.gain.value = depth;
  lfo.connect(gain);
  lfo.start();
  return gain;  // connect: source→ tremolo gain → dest
}

// ── SPOOKY BACKGROUND MUSIC ────────────────────────────────
// Three layers: slow drone, violin melody, disturbing ocarina phrases
function startSpookyMusic() {
  if (!audioCtx || musicStarted) return;
  musicStarted = true;

  const rev = makeReverb(audioCtx, 3.5, 1.8);
  rev.connect(musicMasterGain);

  // ── 1. DEEP DRONE (two detuned saws) ──────────────────────
  function startDrone() {
    const droneNotes = [36, 43]; // C2, G2
    droneNotes.forEach((n, idx) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = note(n) + (idx ? 0.4 : -0.3); // detune
      gain.gain.value = 0.06;
      osc.connect(gain); gain.connect(rev);
      osc.start(); droneNodes.push(osc);

      // Slow volume swell
      const lfoRate = 0.05 + idx*0.02;
      setInterval(() => {
        const now=audioCtx.currentTime;
        const v=0.03+0.05*Math.abs(Math.sin(now*lfoRate*Math.PI));
        gain.gain.setTargetAtTime(v, now, 1.5);
      }, 200);
    });
  }
  startDrone();

  // ── 2. VIOLIN MELODY ──────────────────────────────────────
  // Spooky minor phrases, bowed string simulation (sawtooth + vibrato + filter)
  const VIOLIN_SCALE = [60,62,63,65,67,68,70,72]; // C natural minor
  const SPOOKY_PHRASES = [
    [60,null,63,null,67,65,63,null,60],
    [72,70,68,null,67,null,65,63,60],
    [60,63,67,null,70,68,null,65,63],
    [67,null,68,65,null,63,60,null,58,60],
  ];
  let phraseIdx=0, noteIdx=0;
  let violinPhrase=SPOOKY_PHRASES[0];

  function playViolinNote() {
    if (!audioCtx || !musicStarted) return;
    const mn = violinPhrase[noteIdx];
    noteIdx++;
    if(noteIdx>=violinPhrase.length){
      noteIdx=0;
      phraseIdx=(phraseIdx+1)%SPOOKY_PHRASES.length;
      violinPhrase=SPOOKY_PHRASES[phraseIdx];
    }
    if(mn===null) return; // rest

    const dur  = 0.55 + Math.random()*0.4;
    const freq = note(mn) + (Math.random()-0.5)*1.5;
    const now  = audioCtx.currentTime;

    const osc    = audioCtx.createOscillator();
    const vib    = audioCtx.createOscillator();
    const vibGn  = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    const gainN  = audioCtx.createGain();

    osc.type='sawtooth'; osc.frequency.value=freq;
    vib.type='sine'; vib.frequency.value=5.5;
    vibGn.gain.value=4;
    vib.connect(vibGn); vibGn.connect(osc.frequency);

    filter.type='bandpass'; filter.frequency.value=freq*2; filter.Q.value=2.5;
    gainN.gain.setValueAtTime(0,now);
    gainN.gain.linearRampToValueAtTime(0.22, now+0.08);
    gainN.gain.setTargetAtTime(0, now+dur*0.7, dur*0.15);

    osc.connect(filter); filter.connect(gainN); gainN.connect(rev);
    osc.start(now); osc.stop(now+dur+0.2);
    vib.start(now); vib.stop(now+dur+0.2);
    violinNodes.push(osc);

    setTimeout(playViolinNote, (dur+0.05+Math.random()*0.2)*1000);
  }
  setTimeout(playViolinNote, 800);

  // ── 3. DISTURBING OCARINA ─────────────────────────────────
  // Hollow sine-based, slightly off-pitch, weird intervals
  const OCARINA_MOTIFS = [
    [67,null,null,65,null,63,null,null,62,null,60],
    [60,null,63,null,60,null,58,null,60],
    [72,null,null,70,68,null,65,null,null],
    [63,65,null,68,null,65,63,null,null,60,null],
  ];
  let omIdx=0, onIdx=0;
  let oMotif=OCARINA_MOTIFS[0];

  function playOcarinaNote() {
    if (!audioCtx || !musicStarted) return;
    const mn=oMotif[onIdx];
    onIdx++;
    if(onIdx>=oMotif.length){
      onIdx=0;
      omIdx=(omIdx+1)%OCARINA_MOTIFS.length;
      oMotif=OCARINA_MOTIFS[omIdx];
    }
    const dur=0.45+Math.random()*0.35;
    if(mn!==null){
      const freq=note(mn)*(0.995+Math.random()*0.012); // slightly off-pitch
      const now=audioCtx.currentTime;

      const osc1=audioCtx.createOscillator();
      const osc2=audioCtx.createOscillator();
      const g=audioCtx.createGain();

      osc1.type='sine'; osc1.frequency.value=freq;
      osc2.type='sine'; osc2.frequency.value=freq*2.01; // hollow body

      const gMix=audioCtx.createGain(); gMix.gain.value=0.18;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(0.28, now+0.06);
      g.gain.setTargetAtTime(0, now+dur*0.65, dur*0.12);

      osc1.connect(g); osc2.connect(gMix); gMix.connect(g);
      g.connect(rev); g.connect(musicMasterGain);
      osc1.start(now); osc1.stop(now+dur+0.15);
      osc2.start(now); osc2.stop(now+dur+0.15);
      ocarinaNodes.push(osc1);
    }
    setTimeout(playOcarinaNote, (dur+0.12+Math.random()*0.3)*1000);
  }
  setTimeout(playOcarinaNote, 2200);

  // ── 4. EERIE PIZZICATO PLUCKS (random low strings) ────────
  function pizzicato() {
    if (!audioCtx || !musicStarted) return;
    const pizzNotes=[36,38,41,43,46];
    const n=pizzNotes[Math.floor(Math.random()*pizzNotes.length)];
    const now=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='triangle'; osc.frequency.value=note(n);
    gain.gain.setValueAtTime(0.18,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+1.2);
    osc.connect(gain); gain.connect(rev);
    osc.start(now); osc.stop(now+1.5);
    setTimeout(pizzicato, 1800+Math.random()*3500);
  }
  setTimeout(pizzicato, 1200);
}

// ── DEER SCARY YELLS ───────────────────────────────────────
let deerYellTimer = 0;
let deerChaseYellTimer = 0;

function playDeerYell(type='wander') {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  if (type==='chase') {
    // Aggressive guttural screech — descending saw + growl noise
    const osc  = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const dist = audioCtx.createWaveShaper();
    const gain = audioCtx.createGain();

    // Waveshaper for harsh distortion
    const curve = new Float32Array(256);
    for(let i=0;i<256;i++){const x=i*2/255-1; curve[i]=x<0?-Math.pow(-x,0.7):Math.pow(x,0.7)*1.4;}
    dist.curve=curve;

    osc.type='sawtooth';
    osc.frequency.setValueAtTime(280+Math.random()*60, now);
    osc.frequency.linearRampToValueAtTime(80, now+0.7);
    osc2.type='square'; osc2.frequency.value=37;

    gain.gain.setValueAtTime(0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now+0.9);

    osc.connect(dist); dist.connect(gain);
    osc2.connect(gain);
    gain.connect(sfxMasterGain);
    osc.start(now); osc.stop(now+1.0);
    osc2.start(now); osc2.stop(now+1.0);

    // Second harmonic screech
    setTimeout(()=>{
      if(!audioCtx) return;
      const n2=audioCtx.currentTime;
      const s=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      s.type='sawtooth';
      s.frequency.setValueAtTime(520+Math.random()*80,n2);
      s.frequency.exponentialRampToValueAtTime(190,n2+0.35);
      g.gain.setValueAtTime(0.3,n2);
      g.gain.exponentialRampToValueAtTime(0.001,n2+0.45);
      s.connect(g); g.connect(sfxMasterGain);
      s.start(n2); s.stop(n2+0.5);
    }, 200+Math.random()*100);

  } else {
    // Distant haunting deer call — slow modulated howl
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const rev2 = makeReverb(audioCtx, 2.0, 2.5);
    rev2.connect(sfxMasterGain);

    osc.type='sine';
    const baseFreq=200+Math.random()*80;
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.linearRampToValueAtTime(baseFreq*1.3, now+0.3);
    osc.frequency.linearRampToValueAtTime(baseFreq*0.7, now+0.9);
    osc.frequency.linearRampToValueAtTime(baseFreq*1.1, now+1.4);

    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(0.4,now+0.1);
    gain.gain.setTargetAtTime(0,now+1.0,0.3);
    osc.connect(gain); gain.connect(rev2);
    osc.start(now); osc.stop(now+2.0);
  }
}

function playDeerAttackRoar() {
  if(!audioCtx) return;
  playDeerYell('chase');
  // Extra deep impact thud
  const now=audioCtx.currentTime;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3)*0.9;
  const src=audioCtx.createBufferSource();
  const filt=audioCtx.createBiquadFilter();
  const g=audioCtx.createGain();
  src.buffer=buf; filt.type='lowpass'; filt.frequency.value=180;
  g.gain.value=1.2;
  src.connect(filt); filt.connect(g); g.connect(sfxMasterGain);
  src.start(now);
}

// ── PLAYER COMEDY SOUNDS ───────────────────────────────────
let playerSoundTimer = 0;
const PLAYER_SOUND_INTERVAL_MIN = 8;
const PLAYER_SOUND_INTERVAL_MAX = 20;

function schedulePlayerSounds() {
  const delay = (PLAYER_SOUND_INTERVAL_MIN + Math.random()*(PLAYER_SOUND_INTERVAL_MAX-PLAYER_SOUND_INTERVAL_MIN))*1000;
  setTimeout(()=>{
    if(!gameOver&&!gameWon&&audioCtx) {
      const r=Math.random();
      if(r<0.33) playBurp();
      else if(r<0.66) playWhistle();
      else playFart();
    }
    schedulePlayerSounds();
  }, delay);
}

function playBurp() {
  if(!audioCtx) return;
  const now=audioCtx.currentTime;
  // Burp: low modulated noise burst with pitch drop
  const bufLen=audioCtx.sampleRate*0.45;
  const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  // Voiced noise — mix of low-freq oscillation and noise
  for(let i=0;i<bufLen;i++){
    const t=i/audioCtx.sampleRate;
    const env=Math.pow(Math.sin(Math.PI*i/bufLen),0.4);
    d[i]=(Math.random()*2-1)*0.3*env + Math.sin(2*Math.PI*90*t*Math.pow(1-t*0.8,0.5))*0.6*env;
  }
  const src=audioCtx.createBufferSource();
  const filt=audioCtx.createBiquadFilter();
  const gain=audioCtx.createGain();
  src.buffer=buf;
  filt.type='bandpass'; filt.frequency.value=220; filt.Q.value=1.8;
  gain.gain.value=0.7;
  src.connect(filt); filt.connect(gain); gain.connect(sfxMasterGain);
  src.start(now);
  // Optional subtitle
  showFloatingText('💨 *burp*');
}

function playWhistle() {
  if(!audioCtx) return;
  const now=audioCtx.currentTime;
  // Casual whistle — 2-note melody, pure sine, slightly breathy
  const tunes=[[72,74],[74,72],[76,74],[69,71]];
  const tune=tunes[Math.floor(Math.random()*tunes.length)];
  tune.forEach((mn,idx)=>{
    const t=now+idx*0.28;
    const freq=note(mn)+(Math.random()-0.5)*3;
    const osc=audioCtx.createOscillator();
    const noise_osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    const nGain=audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=freq;
    noise_osc.type='sawtooth'; noise_osc.frequency.value=freq*8;
    nGain.gain.value=0.02; // breathiness
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.55,t+0.04);
    gain.gain.setTargetAtTime(0,t+0.18,0.05);
    osc.connect(gain); noise_osc.connect(nGain); nGain.connect(gain);
    gain.connect(sfxMasterGain);
    osc.start(t); osc.stop(t+0.35);
    noise_osc.start(t); noise_osc.stop(t+0.35);
  });
  showFloatingText('🎵 *whistle*');
}

function playFart() {
  if(!audioCtx) return;
  const now=audioCtx.currentTime;
  // Fart: modulated low noise burst, flutter
  const dur=0.3+Math.random()*0.4;
  const bufLen=Math.floor(audioCtx.sampleRate*dur);
  const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  const baseFreq=60+Math.random()*40;
  const flutterRate=18+Math.random()*12;
  for(let i=0;i<bufLen;i++){
    const t=i/audioCtx.sampleRate;
    const env=Math.pow(Math.sin(Math.PI*i/bufLen),0.5)*(1-t/dur*0.3);
    const flutter=0.5+0.5*Math.sin(2*Math.PI*flutterRate*t);
    d[i]=(Math.random()*2-1)*0.4*flutter*env
       + Math.sin(2*Math.PI*baseFreq*(1+t*0.3)*t)*0.6*flutter*env;
  }
  const src=audioCtx.createBufferSource();
  const filt=audioCtx.createBiquadFilter();
  const gain=audioCtx.createGain();
  src.buffer=buf;
  filt.type='lowpass'; filt.frequency.value=400;
  gain.gain.value=0.65;
  src.connect(filt); filt.connect(gain); gain.connect(sfxMasterGain);
  src.start(now);
  showFloatingText('💨 *pfffft*');
}

// ── FLOATING TEXT EMOTE ────────────────────────────────────
function showFloatingText(txt) {
  const el=document.createElement('div');
  el.textContent=txt;
  el.style.cssText='position:fixed;left:50%;top:42%;transform:translateX(-50%);color:#fff;font-size:16px;font-family:Courier New,monospace;text-shadow:1px 1px 0 #000;pointer-events:none;z-index:50;transition:opacity 1s,top 1s;';
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.top='36%';},100);
  setTimeout(()=>el.remove(),1200);
}

// ── SFX: CHOP ──────────────────────────────────────────────
function playSfxChop() {
  if(!audioCtx) return;
  const now=audioCtx.currentTime;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.12,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const src=audioCtx.createBufferSource();
  const filt=audioCtx.createBiquadFilter();
  const g=audioCtx.createGain();
  src.buffer=buf; filt.type='bandpass'; filt.frequency.value=800; filt.Q.value=0.8;
  g.gain.value=0.4;
  src.connect(filt); filt.connect(g); g.connect(sfxMasterGain);
  src.start(now);
}

// ── SFX: SWORD SWING ───────────────────────────────────────
function playSfxSwing() {
  if(!audioCtx) return;
  const now=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(900,now);
  osc.frequency.exponentialRampToValueAtTime(200,now+0.18);
  gain.gain.setValueAtTime(0.3,now);
  gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
  osc.connect(gain); gain.connect(sfxMasterGain);
  osc.start(now); osc.stop(now+0.25);
}

// ── SFX: CRAFT ─────────────────────────────────────────────
function playSfxCraft() {
  if(!audioCtx) return;
  const now=audioCtx.currentTime;
  [0,0.1,0.2].forEach((delay,i)=>{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=note(60+i*4);
    g.gain.setValueAtTime(0.25,now+delay);
    g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.18);
    osc.connect(g); g.connect(sfxMasterGain);
    osc.start(now+delay); osc.stop(now+delay+0.2);
  });
}

// ── DEER YELL SCHEDULER (random ambient yells) ─────────────
let deerYellInterval = null;
function startDeerYells() {
  if(deerYellInterval) return;
  deerYellInterval = setInterval(()=>{
    if(!gameOver&&!gameWon&&deer.alive&&audioCtx){
      if(deer.state==='chase') playDeerYell('chase');
      else if(Math.random()<0.4) playDeerYell('wander');
    }
  }, 4000+Math.random()*5000);
}

// ── WIRE UP SFX TO GAME EVENTS ─────────────────────────────
// These wrappers will be called by game logic below
function sfxChop()      { if(audioCtx) playSfxChop(); }
function sfxSwing()     { if(audioCtx) playSfxSwing(); }
function sfxCraft()     { if(audioCtx) playSfxCraft(); }
function sfxDeerRoar()  { if(audioCtx) playDeerAttackRoar(); }

// ── INTRO ──────────────────────────────────────────────────
showMessage(
  `🌲 <strong>FOREST SURVIVAL</strong> 🌲<br><br>
  <em>A vicious deer stalks the woods...<br>also aliens, and zombies from the lab.</em><br><br>

  0
);
let introShown=true;
window.addEventListener('keydown',()=>{
  if(introShown){introShown=false;hideMessage();}

// ── MAIN LOOP ──────────────────────────────────────────────
let lastTime=performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  if(!introShown&&!gameOver&&!gameWon){
    updatePlayer(dt);
    updateCar(dt);
    updateDeer(dt);
    updateEnemies(dt);
    updateDayCycle(dt);
    updateCarHint();
  }
  updateCamera();
  updateHUD();
  updateMinimap();
  renderer.render(scene,camera);
}

setInterval(()=>{
  if(!gameOver&&!gameWon&&isInSafeZone(player.pos.x,player.pos.z))
    if(playerHP<100) playerHP=Math.min(100,playerHP+1);
},2000);

animate(performance.now());

window.addEventListener('resize',()=>{
  const W=window.innerWidth,H=window.innerHeight;
  renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
});
